{% extends "admin/base_site.html" %}
{% block content %}
<div style="max-width:480px">
  <h2>Top Up Wallet</h2>
  <p><strong>User:</strong> {{ wallet.user.email }}</p>
  <p><strong>Current Balance:</strong> ${{ wallet.balance }} {{ wallet.currency }}</p>

  <form method="post">
    {% csrf_token %}
    <table>
      {{ form.as_table }}
    </table>
    <br>
    <input type="submit" value="Add Funds" class="button default">
    &nbsp;
    <a href="{% url 'admin:wallet_wallet_changelist' %}" class="button">Cancel</a>
  </form>
</div>
{% endblock %}
